<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Resume Matcher</title>
    <meta name="description" content="Match Candidate CVs with a Job Description using Google Gemini AI">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#f0f9ff',
                            100: '#e0f2fe',
                            500: '#0ea5e9',
                            600: '#0284c7',
                            900: '#0c4a6e',
                        }
                    }
                }
            }
        }
    </script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen font-sans antialiased bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900 background-animate">
    
    <div class="max-w-6xl mx-auto px-4 py-12">
        <!-- Header -->
        <header class="text-center mb-16">
            <h1 class="text-5xl font-extrabold tracking-tight mb-4 text-transparent bg-clip-text bg-gradient-to-r from-brand-500 to-indigo-400">
                AI Resume Matcher
            </h1>
            <p class="text-slate-400 text-lg max-w-2xl mx-auto">
                Upload your Job Description and Candidate CVs to instantly find the best match using advanced AI analysis.
            </p>
        </header>

        <!-- Main Content Grid -->
        <main class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-12">
            
            <!-- Job Description Column -->
            <div class="glass-panel p-8 rounded-2xl relative overflow-hidden group">
                <div class="absolute inset-0 bg-gradient-to-br from-brand-600/10 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-500 pointer-events-none"></div>
                <h2 class="text-2xl font-semibold mb-6 flex items-center">
                    <svg class="w-6 h-6 mr-3 text-brand-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                    Job Description
                </h2>
                
                <label for="jd-file" id="jd-dropzone" class="block border-2 border-dashed border-slate-600 rounded-xl p-10 text-center cursor-pointer hover:border-brand-500 hover:bg-slate-800/50 transition-all duration-300">
                    <svg class="w-12 h-12 mx-auto text-slate-400 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
                    <p class="text-slate-300 font-medium mb-1">Drag and drop your JD here</p>
                    <p class="text-slate-500 text-sm">or click to browse</p>
                    <p class="text-xs text-slate-500 mt-4">Accepts 1 PDF file</p>
                    <input type="file" id="jd-file" class="sr-only" accept="application/pdf">
                </label>
                
                <!-- Selected JD File Preview -->
                <div id="jd-preview" class="hidden mt-6 p-4 rounded-lg bg-slate-800/80 border border-slate-700 flex items-center justify-between">
                    <div class="flex items-center">
                        <svg class="w-8 h-8 text-red-400 mr-3" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M4 4a2 2 0 012-2h4.586A2 2 0 0112 2.586L15.414 6A2 2 0 0116 7.414V16a2 2 0 01-2 2H6a2 2 0 01-2-2V4zm2 6a1 1 0 011-1h6a1 1 0 110 2H7a1 1 0 01-1-1zm1 3a1 1 0 100 2h6a1 1 0 100-2H7z" clip-rule="evenodd"></path></svg>
                        <div>
                            <p id="jd-filename" class="text-sm font-medium text-slate-200 truncate max-w-[200px]"></p>
                            <p id="jd-filesize" class="text-xs text-slate-400"></p>
                        </div>
                    </div>
                    <button id="remove-jd" class="text-slate-400 hover:text-red-400 transition-colors p-2">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                    </button>
                </div>
            </div>

            <!-- CVs Column -->
            <div class="glass-panel p-8 rounded-2xl relative overflow-hidden group">
                <div class="absolute inset-0 bg-gradient-to-br from-indigo-600/10 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-500 pointer-events-none"></div>
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-2xl font-semibold flex items-center">
                        <svg class="w-6 h-6 mr-3 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                        Candidate CVs
                    </h2>
                    <span id="cv-count" class="bg-indigo-500/20 text-indigo-300 text-xs font-bold px-3 py-1 rounded-full border border-indigo-500/30">
                        0 selected
                    </span>
                </div>
                
                <label for="cv-files" id="cv-dropzone" class="block border-2 border-dashed border-slate-600 rounded-xl p-10 text-center cursor-pointer hover:border-indigo-400 hover:bg-slate-800/50 transition-all duration-300">
                    <svg class="w-12 h-12 mx-auto text-slate-400 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7v8a2 2 0 002 2h6M8 7V5a2 2 0 012-2h4.586a1 1 0 01.707.293l4.414 4.414a1 1 0 01.293.707V15a2 2 0 01-2 2h-2M8 7H6a2 2 0 00-2 2v10a2 2 0 002 2h8a2 2 0 002-2v-2"></path></svg>
                    <p class="text-slate-300 font-medium mb-1">Drag and drop CVs here</p>
                    <p class="text-slate-500 text-sm">or click to browse</p>
                    <p class="text-xs text-slate-500 mt-4">Accepts multiple PDF files</p>
                    <input type="file" id="cv-files" class="sr-only" accept="application/pdf" multiple>
                </label>

                <!-- Selected CV Files Preview List -->
                <div id="cv-preview-container" class="mt-6 max-h-48 overflow-y-auto space-y-3 pr-2 custom-scrollbar hidden">
                    <!-- CV items injected by JS -->
                </div>
            </div>

        </main>

        <!-- Action Area -->
        <div class="text-center mb-16">
            <button id="match-btn" disabled class="group relative px-8 py-4 bg-gradient-to-r from-brand-600 to-indigo-600 text-white font-bold rounded-xl text-lg shadow-lg shadow-brand-500/30 transition-all duration-300 hover:-translate-y-1 hover:shadow-brand-500/50 disabled:opacity-50 disabled:cursor-not-allowed disabled:hover:translate-y-0 disabled:hover:shadow-none overflow-hidden">
                <div class="absolute inset-0 bg-white/20 translate-y-full group-hover:translate-y-0 transition-transform duration-300 ease-in-out"></div>
                <span class="relative flex items-center justify-center">
                    <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"></path></svg>
                    Run AI Matcher
                </span>
            </button>
            <p id="error-message" class="text-red-400 mt-4 text-sm hidden"></p>
        </div>

        <!-- Progress/Loading State (Hidden by default) -->
        <div id="loading-state" class="hidden mb-16 max-w-2xl mx-auto glass-panel p-8 rounded-2xl text-center">
            <div class="inline-block relative w-20 h-20 mb-6">
                <div class="absolute inset-0 border-4 border-slate-700 rounded-full"></div>
                <div class="absolute inset-0 border-4 border-brand-500 rounded-full border-t-transparent animate-spin"></div>
                <div class="absolute inset-0 flex items-center justify-center text-brand-500">
                    <svg class="w-8 h-8 animate-pulse" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                </div>
            </div>
            <h3 class="text-2xl font-semibold mb-2 text-white">Analyzing Résumés</h3>
            <p id="loading-text" class="text-slate-400">Google Gemini AI is extracting and matching key skills...</p>
            
            <div class="w-full bg-slate-700/50 rounded-full h-2 mt-6 overflow-hidden">
                <div class="bg-gradient-to-r from-brand-500 to-indigo-500 h-2 rounded-full w-2/3 animate-[pulse_2s_ease-in-out_infinite]"></div>
            </div>
        </div>

        <!-- Results Dashboard (Hidden by default) -->
        <div id="results-dashboard" class="hidden">
            <div class="flex items-center justify-between mb-8">
                <h2 class="text-3xl font-bold">Match Results</h2>
                <div class="flex gap-4">
                    <button id="reset-btn" class="px-4 py-2 bg-slate-800 hover:bg-slate-700 text-slate-300 rounded-lg text-sm font-medium transition-colors border border-slate-700">
                        Start New Match
                    </button>
                </div>
            </div>

            <div id="results-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- Result Cards Injected by JS -->
            </div>
        </div>

    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>
